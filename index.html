<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Items System</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Bento Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            perspective: 1000px; /* Para sa 3D effects mamaya */
        }

        .card {
            background: var(--glass-bg);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.15s ease-out, box-shadow 0.3s ease, border-color 0.3s ease;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* Standard static fallback properties kapag walang mouse activity */
        .card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 45px 0 rgba(0, 0, 0, 0.4);
        }

        .col-span-2 { grid-column: span 2; }
        .col-span-1 { grid-column: span 1; }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 20px;
            color: var(--text-main);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        /* Forms styling */
        .form-group {
            margin-bottom: 15px;
        }

        /* Magkatabing Price per Pcs at Pack sa Form */
        .price-row-inline {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.35);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
            transform: translateY(-1px);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-warning { background: var(--warning); }
        .btn-warning:hover { 
            background: var(--warning-hover); 
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            margin-top: 10px;
        }
        .btn-secondary:hover { 
            background: rgba(255, 255, 255, 0.05); 
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
        }

        /* Search Bar */
        .search-wrapper {
            margin-bottom: 20px;
        }

        /* Items List Container */
        .items-container {
            max-height: 520px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .items-container::-webkit-scrollbar, .cat-list-wrapper::-webkit-scrollbar {
            width: 6px;
        }
        .items-container::-webkit-scrollbar-thumb, .cat-list-wrapper::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            will-change: transform, background-color;
        }

        .item-main-info {
            flex: 1;
        }

        .item-details h4 {
            font-size: 1rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .item-details p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .item-right-side {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Magkatabing display ng Price sa Dashboard */
        .dashboard-prices {
            display: flex;
            gap: 15px;
            text-align: right;
        }

        .price-box {
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .item-price {
            font-weight: 700;
            color: var(--success);
        }

        .item-unit {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .action-btns {
            display: flex;
            gap: 6px;
        }

        .btn-action {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-edit:hover {
            background: var(--warning);
            border-color: var(--warning);
            transform: scale(1.05);
        }

        .btn-delete:hover {
            background: var(--danger);
            border-color: var(--danger);
            transform: scale(1.05);
        }

        /* Category manager styling */
        .cat-list-wrapper {
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        .cat-chip {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 4px;
            transition: all 0.2s ease;
        }

        .cat-chip:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-del-cat {
            background: transparent;
            border: none;
            color: var(--text-muted);
            margin-left: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: color 0.2s, transform 0.2s;
        }

        .btn-del-cat:hover { 
            color: var(--danger); 
            transform: scale(1.2);
        }

        /* Responsive Breakpoints */
        @media (max-width: 900px) {
            .bento-grid { grid-template-columns: 1fr; }
            .col-span-2, .col-span-1 { grid-column: span 1; }
            body { padding: 12px; }
            .item-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .item-right-side {
                width: 100%;
                justify-content: space-between;
                border-top: 1px solid var(--glass-border);
                padding-top: 10px;
            }
            .dashboard-prices { text-align: left; }
        }

        /* Keyframe Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Store Items Dashboard</h1>
    </header>

    <div class="bento-grid">
        <div class="card col-span-2">
            <h2>Items List</h2>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Type to search items by name or category...">
            </div>
            <div class="items-container" id="itemsLog"></div>
        </div>

        <div class="card col-span-1">
            <h2 id="formTitle">Add New Item</h2>
            
            <form id="itemForm" onsubmit="handleItemFormSubmit(event)">
                <input type="hidden" id="editItemId" value="">

                <div class="form-group">
                    <label for="itemCategory">Category</label>
                    <select id="itemCategory" required></select>
                </div>
                
                <div class="form-group">
                    <label for="itemName">Product Name</label>
                    <input type="text" id="itemName" placeholder="e.g., Items here" required>
                </div>

                <div class="price-row-inline">
                    <div>
                        <label for="pricePcs">Price (per Pcs)</label>
                        <input type="number" id="pricePcs" step="0.01" placeholder="0.00">
                    </div>
                    <div>
                        <label for="pricePack">Price (per Pack)</label>
                        <input type="number" id="pricePack" step="0.01" placeholder="0.00">
                    </div>
                </div>

                <button type="submit" id="btnSubmitForm" class="btn">Add New Item</button>
                <button type="button" id="btnCancelEdit" class="btn btn-secondary" style="display: none;" onclick="resetItemForm()">Cancel Edit</button>
            </form>

            <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 25px 0;">

            <h2>Categories Manager</h2>
            <div class="cat-list-wrapper" id="categoriesContainer"></div>

            <form id="categoryForm" onsubmit="addCategory(event)">
                <div class="form-group">
                    <label for="newCategory">New Category Name</label>
                    <input type="text" id="newCategory" placeholder="e.g., Categories" required>
                </div>
                <button type="submit" class="btn btn-secondary">Create Category</button>
            </form>
        </div>
    </div>
</div>

<script>
    const defaultCategories = ["Groceries", "Electronics", "Baking Supplies"];
    const defaultItems = [
        { id: 1719374000000, name: "Instant Noodles", category: "Groceries", pricePcs: "15.00", pricePack: "85.00" },
        { id: 1719374100000, name: "USB Type-C Cable", category: "Electronics", pricePcs: "180.00", pricePack: "0.00" }
    ];

    let categories = JSON.parse(localStorage.getItem('store_categories')) || defaultCategories;
    let items = JSON.parse(localStorage.getItem('store_items')) || defaultItems;

    const itemsLog = document.getElementById('itemsLog');
    const itemCategorySelect = document.getElementById('itemCategory');
    const categoriesContainer = document.getElementById('categoriesContainer');
    const searchInput = document.getElementById('searchInput');
    
    const itemForm = document.getElementById('itemForm');
    const formTitle = document.getElementById('formTitle');
    const btnSubmitForm = document.getElementById('btnSubmitForm');
    const btnCancelEdit = document.getElementById('btnCancelEdit');
    const editItemId = document.getElementById('editItemId');

    function init() {
        renderCategories();
        renderItems(items);
        initCardTiltEffect(); // I-run ang 3D tilt animation sa loading
        
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredItems = items.filter(item => 
                item.name.toLowerCase().includes(query) || 
                item.category.toLowerCase().includes(query)
            );
            renderItems(filteredItems);
        });
    }

    function renderCategories() {
        itemCategorySelect.innerHTML = categories.map(cat => 
            `<option value="${cat}">${cat}</option>`
        ).join('');

        categoriesContainer.innerHTML = categories.map(cat => `
            <span class="cat-chip" style="animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;">
                ${cat}
                <button type="button" class="btn-del-cat" onclick="deleteCategory('${cat}')" title="Delete Category">&times;</button>
            </span>
        `).join('');
    }

    function renderItems(itemsArray) {
        if(itemsArray.length === 0) {
            itemsLog.innerHTML = `<p style="color: var(--text-muted); text-align:center; padding: 20px;">No items found.</p>`;
            return;
        }

        // Gumagamit ng staggered entry animation delay gamit ang JS loop index
        itemsLog.innerHTML = itemsArray.map((item, index) => {
            const pcsDisplay = (item.pricePcs && parseFloat(item.pricePcs) > 0) ? `₱${parseFloat(item.pricePcs).toFixed(2)}` : '—';
            const packDisplay = (item.pricePack && parseFloat(item.pricePack) > 0) ? `₱${parseFloat(item.pricePack).toFixed(2)}` : '—';
            const animDelay = Math.min(index * 0.05, 0.4); // limitahan ang delay para sa mahabang listahan

            return `
                <div class="item-row" style="animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) ${animDelay}s both;">
                    <div class="item-main-info">
                        <div class="item-details">
                            <h4>${item.name}</h4>
                            <p>Category: ${item.category}</p>
                        </div>
                    </div>
                    <div class="item-right-side">
                        <div class="dashboard-prices">
                            <div class="price-box">
                                <span class="item-price">${pcsDisplay}</span>
                                <span class="item-unit">per pcs</span>
                            </div>
                            <div class="price-box">
                                <span class="item-price" style="color: #60a5fa;">${packDisplay}</span>
                                <span class="item-unit">per pack</span>
                            </div>
                        </div>
                        <div class="action-btns">
                            <button class="btn-action btn-edit" onclick="startEditItem(${item.id})">Edit</button>
                            <button class="btn-action btn-delete" onclick="deleteItem(${item.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        initItemRowHoverEffects(); // Ikabit ang JS hover reactive triggers
    }

    function handleItemFormSubmit(e) {
        e.preventDefault();
        
        if (categories.length === 0) {
            alert("Please create at least one category first.");
            return;
        }

        const nameValue = document.getElementById('itemName').value.trim();
        const catValue = itemCategorySelect.value;
        const pcsValue = document.getElementById('pricePcs').value || "0.00";
        const packValue = document.getElementById('pricePack').value || "0.00";

        if(pcsValue === "0.00" && packValue === "0.00") {
            alert("Please fill in at least one price field (Pcs or Pack).");
            return;
        }

        if (editItemId.value === "") {
            const newItem = {
                id: Date.now(),
                name: nameValue,
                category: catValue,
                pricePcs: pcsValue,
                pricePack: packValue
            };
            items.push(newItem);
        } else {
            const targetId = parseInt(editItemId.value);
            items = items.map(item => {
                if(item.id === targetId) {
                    return { ...item, name: nameValue, category: catValue, pricePcs: pcsValue, pricePack: packValue };
                }
                return item;
            });
        }

        localStorage.setItem('store_items', JSON.stringify(items));
        resetItemForm();
        renderItems(items);
    }

    function startEditItem(id) {
        const currentItem = items.find(item => item.id === id);
        if(!currentItem) return;

        formTitle.innerText = "Update Item Details";
        btnSubmitForm.innerText = "Update Product";
        btnSubmitForm.classList.add('btn-warning');
        btnCancelEdit.style.display = "block";
        
        editItemId.value = currentItem.id;
        document.getElementById('itemName').value = currentItem.name;
        itemCategorySelect.value = currentItem.category;
        document.getElementById('pricePcs').value = currentItem.pricePcs;
        document.getElementById('pricePack').value = currentItem.pricePack;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetItemForm() {
        formTitle.innerText = "Add New Item";
        btnSubmitForm.innerText = "Add New Item";
        btnSubmitForm.classList.remove('btn-warning');
        btnCancelEdit.style.display = "none";
        
        editItemId.value = "";
        itemForm.reset();
        searchInput.value = '';
    }

    function deleteItem(id) {
        const itemToDelete = items.find(item => item.id === id);
        if (!itemToDelete) return;

        if (confirm(`Are you sure you want to delete the item "${itemToDelete.name}"?`)) {
            items = items.filter(item => item.id !== id);
            localStorage.setItem('store_items', JSON.stringify(items));
            
            const query = searchInput.value.toLowerCase();
            const filteredItems = items.filter(item => 
                item.name.toLowerCase().includes(query) || 
                item.category.toLowerCase().includes(query)
            );
            renderItems(filteredItems);
            
            if(editItemId.value === String(id)) {
                resetItemForm();
            }
        }
    }

    function addCategory(e) {
        e.preventDefault();
        const catInput = document.getElementById('newCategory');
        const newCatName = catInput.value.trim();

        if(categories.some(c => c.toLowerCase() === newCatName.toLowerCase())) {
            alert("Category already exists!");
            return;
        }

        categories.push(newCatName);
        localStorage.setItem('store_categories', JSON.stringify(categories));
        
        catInput.value = '';
        renderCategories();
        itemCategorySelect.value = newCatName; 
    }

    function deleteCategory(catName) {
        if(confirm(`Are you sure you want to delete the category "${catName}"?`)) {
            categories = categories.filter(c => c !== catName);
            localStorage.setItem('store_categories', JSON.stringify(categories));
            renderCategories();
        }
    }

    /* ===================================================
       MGA INTERACTIVE HOVER ANIMATIONS GAMIT ANG JAVASCRIPT
       ===================================================
    */

    // 1. JS Interaction: Advanced Hover para sa mga Item Rows sa loob ng listahan
    function initItemRowHoverEffects() {
        const rows = document.querySelectorAll('.item-row');
        rows.forEach(row => {
            row.addEventListener('mouseenter', () => {
                row.style.backgroundColor = 'rgba(255, 255, 255, 0.08)';
                row.style.borderColor = 'var(--accent)';
                row.style.transform = 'translateX(6px)';
                
                // Bahagyang i-pop out ang text
                const text = row.querySelector('h4');
                if(text) text.style.color = 'var(--accent)';
            });

            row.addEventListener('mouseleave', () => {
                row.style.backgroundColor = 'rgba(255, 255, 255, 0.02)';
                row.style.borderColor = 'var(--glass-border)';
                row.style.transform = 'translateX(0)';
                
                const text = row.querySelector('h4');
                if(text) text.style.color = 'var(--text-main)';
            });
        });
    }

    // 2. JS Interaction: Modern 3D Tilt Effect sa Bento Grid Main Cards (Para sa PC browsers)
    function initCardTiltEffect() {
        // Hindi pinapagana sa mobile device para iwas lag at maganda ang scroll handle
        if (window.innerWidth <= 900) return;

        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const cardRect = card.getBoundingClientRect();
                
                // Hanapin ang mouse coordinates relative sa mismong card boundary
                const cardX = e.clientX - cardRect.left;
                const cardY = e.clientY - cardRect.top;
                
                // I-normalize ang value mula -0.5 hanggang 0.5
                const xPercent = cardX / cardRect.width - 0.5;
                const yPercent = cardY / cardRect.height - 0.5;
                
                // Kalkulahin ang anggulo ng rotation (max 4 degrees para swabe)
                const rotateX = (-yPercent * 4).toFixed(2);
                const rotateY = (xPercent * 4).toFixed(2);
                
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-2px)`;
            });

            // Ibalik sa zero state kapag inalis ang mouse pointer
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'rotateX(0deg) rotateY(0deg) translateY(0)';
            });
        });
    }

    // Patakbuhin ang initialization
    init();
</script>
</body>
</html>
